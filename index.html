<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeriSpotify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify">MeriSpotify</li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

<div class="container">
    
    <div class="songList"><h1>Best of Vishnu</h1>
        <div class="songItemContainer">
            <div class="songItem">
                <img src="cover1.jpg" alt="1">
                <span>Tum Pukarlo</span>
                <span class="songListPlay"> <span class="timeStamp"> 01:02 <i class="fa-regular fa-play-circle" ></i></span></span>

            </div>
            <div class="songItem">
                <img src="cover1.jpg" alt="1">
                <span>Babul</span>
                <span class="songListPlay"> <span class="timeStamp"> 01:29 <i class="fa-regular fa-play-circle" ></i></span></span>

            </div>
            <div class="songItem">
                <img src="cover1.jpg" alt="1">
                <span>Tu  Hai aasman mein</span>
                <span class="songListPlay"> <span class="timeStamp"> 0:53 <i class="fa-regular fa-play-circle" ></i></span></span>

            </div>
        </div>
    </div>
    
    <div class="songBanner"></div>
</div>

<div class="bottom">
    <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">
    <div class="icons">
        <!-- fontawesome icons -->
        <i class="fa-solid fa-3x fa-backward"></i>
        <i class="fa-regular fa-3x fa-play-circle" id="masterPlay"></i>
        <i class="fa-solid fa-3x fa-forward"></i>
    </div>
    <div class="songInfo">
        <img src="playing.gif" width="42px" alt="" id="gif"> Tum Pukarlo
    </div>
</div>
    <script src="https://kit.fontawesome.com/2ffc58648a.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
